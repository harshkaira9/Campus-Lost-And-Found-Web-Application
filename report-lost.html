<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Lost Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="all.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">Campus Lost & Found</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="browse.html">Browse Items</a></li>
                    <li class="nav-item"><a class="nav-link" href="report-lost.html">Report Lost</a></li>
                    <li class="nav-item"><a class="nav-link" href="report-found.html">Report Found</a></li>
                    <li class="nav-item"><a class="nav-link" href="messages.html">Messages</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Report a Lost Item</h2>
        <form id="lostItemForm">
            <div class="mb-3">
                <label for="item-name" class="form-label">Item Name</label>
                <input type="text" class="form-control" id="item-name" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label for="location-lost" class="form-label">Last Seen Location</label>
                <input type="text" class="form-control" id="location-lost" placeholder="e.g., Library 2nd Floor" required>
            </div>
            <div class="mb-3">
                <label for="date-lost" class="form-label">Date Lost</label>
                <input type="date" class="form-control" id="date-lost" required>
            </div>
            <div class="mb-3">
                <label for="contact-email" class="form-label">Contact Email</label>
                <input type="email" class="form-control" id="contact-email" required>
            </div>
            <button type="submit" class="btn btn-success">Submit Report</button>
        </form>
    </div>

    <footer class="bg-light text-center py-3 mt-5">
        <p>&copy; 2025 Campus Lost & Found System. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('lostItemForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Lost item reported successfully!');
            // In real app: send data to backend API
        });
    </script>
</body>
</html>
